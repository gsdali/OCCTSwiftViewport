name: OCCTSwiftViewport
options:
  bundleIdPrefix: com.occtswift
  deploymentTarget:
    iOS: "18.0"
    macOS: "15.0"
  xcodeVersion: "16.0"
  generateEmptyDirectories: false

packages:
  OCCTSwiftViewport:
    path: .

targets:
  OCCTSwiftMetalDemo:
    type: application
    platform: [macOS, iOS]
    sources:
      - path: Sources/OCCTSwiftMetalDemo
    dependencies:
      - package: OCCTSwiftViewport
    settings:
      base:
        SWIFT_VERSION: "6.0"
        PRODUCT_BUNDLE_IDENTIFIER: com.occtswift.metal-demo
        INFOPLIST_GENERATION_MODE: GeneratedFile
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "1"
        GENERATE_INFOPLIST_FILE: YES
        SWIFT_STRICT_CONCURRENCY: complete
        OTHER_LDFLAGS: ["-weak_framework", "AVKit"]
      configs:
        debug:
          SWIFT_OPTIMIZATION_LEVEL: "-Onone"
        release:
          SWIFT_OPTIMIZATION_LEVEL: "-O"
