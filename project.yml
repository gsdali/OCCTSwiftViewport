name: OCCTSwiftViewport
options:
  bundleIdPrefix: com.occtswift
  deploymentTarget:
    iOS: "18.0"
    macOS: "15.0"
  xcodeVersion: "16.0"
  generateEmptyDirectories: false

packages:
  OCCTSwiftViewport:
    path: .
  OCCTSwift:
    path: ../OCCTSwift
  OCCTSwiftTools:
    url: https://github.com/gsdali/OCCTSwiftTools.git
    from: 0.4.1

targets:
  OCCTSwiftMetalDemo:
    type: application
    platform: [macOS, iOS]
    sources:
      - path: Sources/OCCTSwiftMetalDemo
    dependencies:
      - package: OCCTSwiftViewport
      - package: OCCTSwiftTools
        product: OCCTSwiftTools
      - package: OCCTSwift
        product: OCCTSwift
    settings:
      base:
        SWIFT_VERSION: "6.0"
        PRODUCT_BUNDLE_IDENTIFIER: com.occtswift.metal-demo
        INFOPLIST_GENERATION_MODE: GeneratedFile
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "1"
        GENERATE_INFOPLIST_FILE: YES
        SWIFT_STRICT_CONCURRENCY: complete
        OTHER_LDFLAGS: ["-weak_framework", "AVKit"]
        DEVELOPMENT_TEAM: 6D6BN844NR
        # iOS Info.plist keys — ignored on macOS. Support all orientations
        # (CAD viewport is useful in any), and auto-generate a launch screen.
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPhone: "UIInterfaceOrientationPortrait UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPad: "UIInterfaceOrientationPortrait UIInterfaceOrientationPortraitUpsideDown UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
      configs:
        debug:
          SWIFT_OPTIMIZATION_LEVEL: "-Onone"
        release:
          SWIFT_OPTIMIZATION_LEVEL: "-O"

  OCCTSwiftMetalDemoUITests_macOS:
    type: bundle.ui-testing
    platform: macOS
    sources:
      - path: UITests/OCCTSwiftMetalDemoUITests
    dependencies:
      - target: OCCTSwiftMetalDemo_macOS
    settings:
      base:
        SWIFT_VERSION: "6.0"
        PRODUCT_BUNDLE_IDENTIFIER: com.occtswift.metal-demo.uitests
        GENERATE_INFOPLIST_FILE: YES

  OCCTSwiftMetalDemoUITests_iOS:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: UITests/OCCTSwiftMetalDemoUITests
    dependencies:
      - target: OCCTSwiftMetalDemo_iOS
    settings:
      base:
        SWIFT_VERSION: "6.0"
        PRODUCT_BUNDLE_IDENTIFIER: com.occtswift.metal-demo.uitests
        GENERATE_INFOPLIST_FILE: YES
